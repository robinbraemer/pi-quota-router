name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Audit production dependencies
        run: bun run audit

      - name: Scan tracked files and test output for secrets
        run: bun run check:secrets

      - name: Configure private GitHub clone
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Smoke-test Pi's GitHub install path
        env:
          PI_QUOTA_ROUTER_GIT_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bun run smoke:install

      - name: Check package contents
        run: bun run pack:check
