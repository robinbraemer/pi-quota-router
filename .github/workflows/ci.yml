name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Audit production dependencies
        run: bun run audit

      - name: Scan tracked files and test output for secrets
        run: bun run check:secrets

      - name: Check public documentation hygiene
        run: bun run check:public-hygiene

      - name: Smoke-test Pi's local Git install path
        env:
          PI_QUOTA_ROUTER_GIT_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bun run smoke:install

      - name: Smoke-test Pi's public HTTPS Git install path
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          PI_QUOTA_ROUTER_GIT_SOURCE: git:${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/robinbraemer/pi-quota-router.git' }}
          PI_QUOTA_ROUTER_GIT_REVISION: ${{ github.event.pull_request.head.sha || github.sha }}
          PI_QUOTA_ROUTER_REQUIRE_PUBLISHED_REVISION: "1"
          PI_QUOTA_ROUTER_CREDENTIAL_FREE: "1"
        run: bun run smoke:install

      - name: Check package contents
        run: bun run pack:check
